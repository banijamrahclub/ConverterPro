<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول الصيغ المحترف | تحويل فيديو، صوت، صور ومستندات مجاناً</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6680293729782435"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-overlay"></div>
    <header>
        <nav class="container">
            <a href="index_ar.html" class="logo">
                <i data-lucide="refresh-cw" class="logo-icon"></i>
                <span>Converter<span>Pro</span></span>
            </a>
            <div class="nav-links">
                <div class="lang-switcher">
                    <button class="lang-btn"><i data-lucide="languages"></i> AR</button>
                    <div class="lang-menu">
                        <a href="index_en.html">English</a>
                        <a href="index_es.html">Español</a>
                        <a href="index_fr.html">Français</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-section container">
            <div class="hero-content">
                <h1 class="animate-up">حوّل ملفاتك <span>بضغطة زر واحدة</span></h1>
                <p class="animate-up delay-1">المحرك السحابي الأول لتحويل جميع أنواع الميديا والمستندات بـ Converter Pro.</p>
                <div class="converter-box animate-up delay-2" id="dropZone">
                    <div class="upload-icon-wrapper"><i data-lucide="upload-cloud" class="upload-icon"></i></div>
                    <h2>اسحب الملفات هنا للبدء</h2>
                    <p>يدعم أكثر من 200 صيغة (فيديو، صوت، صور، PDF)</p>
                    <input type="file" id="fileInput" hidden multiple>
                    <button class="btn-select" onclick="document.getElementById('fileInput').click()">اختار الملف من جهازك</button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
